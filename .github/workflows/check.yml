name: Check Formatting and Schema

on:
  push:
  pull_request:
    branches: main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check JSON formatting
        run: npx prettier --check .

      - name: Validate registry.json against registry.schema.json
        run: npx ajv-cli validate -s src/registry.schema.json -d registry.json

      - name: Validate registry entries (uniqueness, reachable repos, package.json schema)
        run: npm run validate
